name: Build and Verify 16KB Page Size Alignment

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        echo "Installing Android NDK 29.0.14206865..."
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;29.0.14206865"
        echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: clone platform repo
      run: git clone --branch ferment-2.0 https://github.com/hashengineering/platform.git ../platform

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Install SWIG and protoc
      run: |
        sudo apt-get update
        sudo apt-get install -y swig
        PROTOC_VERSION=25.3
        PROTOC_SHA256="f853e691868d0557425ea290bf7ba6384eef2fa9b04c323afab49a770ba9da80"
        BASE_URL="https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}"
        ZIP_FILE="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
        curl -fL -o "${ZIP_FILE}" "${BASE_URL}/${ZIP_FILE}"
        echo "${PROTOC_SHA256}  ${ZIP_FILE}" | sha256sum --check
        PROTOC_TMP=$(mktemp -d)
        unzip -n "${ZIP_FILE}" -d "${PROTOC_TMP}"
        cp -n "${PROTOC_TMP}/bin/protoc" "$HOME/.local/bin/protoc"
        chmod +x "$HOME/.local/bin/protoc"
        rm -rf "${PROTOC_TMP}" "${ZIP_FILE}" "${ZIP_FILE}.sha256sum"
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install cbindgen
      run: cargo install cbindgen

    - name: generate the header file
      run: |
        cd dash-sdk-bindings
        cargo build
        cd ..

    - name: Generate SWIG bindings
      run: ./gradlew generateSWIG

    - name: Generate Protobuf
      run: ./gradlew generateProto

    - name: Install Cargo NDK and Rust targets
      run: |
        cargo install cargo-ndk --version "^3"
        rustup component add rust-src --toolchain nightly
        rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android --toolchain nightly

    - name: Build CMake
      run: ./gradlew cmakeClean cmakeConfigure cmakeBuild

    - name: Build with Gradle
      run: ./gradlew build

    - name: Verify 16KB Page Size Alignment
      run: ./scripts/verify-16kb-alignment.sh

    - name: Verify AAR Contents
      run: |
        echo "🔍 Verifying AAR files contain native libraries..."

        # Find AAR files
        aar_files=$(find . -name "*.aar" -path "*/build/outputs/aar/*" -type f)

        if [ -z "$aar_files" ]; then
          echo "❌ No AAR files found"
          exit 1
        fi

        echo "Found AAR files:"
        for aar in $aar_files; do
          echo "📦 $(basename $aar)"

          # Check if AAR contains native libraries
          native_libs=$(unzip -l "$aar" | grep -E "jni/.*\.so$" | wc -l)

          if [ $native_libs -gt 0 ]; then
            echo "  ✅ Contains $native_libs native libraries"
            echo "  📋 Native library details:"
            unzip -l "$aar" | grep -E "jni/.*\.so$" | awk '{print "    " $4}'
          else
            echo "  ℹ️  No native libraries (library may be pure Java/Kotlin)"
          fi
          echo
        done

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-outputs
        path: |
          **/build/outputs/aar/*.aar
          **/build/intermediates/cxx/*/obj/*/*.so
        retention-days: 7

    - name: Upload lint reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-reports
        path: |
          **/build/reports/lint-results-*.html
        retention-days: 7